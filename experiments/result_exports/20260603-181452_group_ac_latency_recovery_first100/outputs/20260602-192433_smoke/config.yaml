experiment:
  name: smoke
  output_root: outputs
  src_dir: ASPS/experiments/SelfEval-Guided-Decoding/src
  stop_on_failure: true
runtime:
  python: python3
env:
  HF_TOKEN: HF_TOKEN_REDACTED
models:
  big_model: meta-llama/Meta-Llama-3.1-8B-Instruct
  small_model: meta-llama/Llama-3.2-1B-Instruct
  auth_token: HF_TOKEN_REDACTED
  big_device: cuda:0
  small_device: cuda:1
metric:
  name: accuracy
  mode: max
common_args:
  batch_size: 1
  seed: 0
  max_tokens: 64
  chatgpt: false
  verbal: false
  reverse: false
datasets:
- name: gsm8k
  input_file: /root/autodl-tmp/Project_2/ASPS/experiments/SelfEval-Guided-Decoding/data/gsm8k_test.jsonl
  start: 0
  end: 0
groups:
  baseline:
    enabled: true
    env:
      CUDA_VISIBLE_DEVICES: '0'
    args:
      temperature: 0.0
      top_p: 1.0
      n_samples: 1
      mini_n_samples: 1
  group_a:
    enabled: true
    env:
      CUDA_VISIBLE_DEVICES: 0,1
    args:
      entropy_threshold: 1.5
      draft_candidates: 3
      max_draft_tokens: 32
      max_fallback_tokens: 32
      big_temperature: 0.0
      big_top_p: 1.0
      small_temperature: 0.7
      small_top_p: 0.9
  group_c:
    enabled: true
    env:
      CUDA_VISIBLE_DEVICES: 0,1
    args:
      entropy_threshold: 1.5
      draft_candidates: 3
      max_draft_tokens: 32
      max_fallback_tokens: 32
      length_weight_alpha: 0.05
      length_weight_mode: longer
      big_temperature: 0.0
      big_top_p: 1.0
      small_temperature: 0.7
      small_top_p: 0.9
  group_b:
    enabled: true
    env:
      CUDA_VISIBLE_DEVICES: '0'
    args:
      temperature: 0.0
      top_p: 1.0
      max_reflection_tokens: 64
